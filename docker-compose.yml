services:
  backend:
    build: ./flexisport-backend
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      PORT: 5000
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./flexisport-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  uploads_data:
