<div class="dialog-overlay" *ngIf="visible" (click)="dismiss()">
  <div class="dialog-box" (click)="$event.stopPropagation()">
    <h3 class="dialog-title">📢 Publish a post?</h3>
    <p class="dialog-subtitle">Share this update with the community. You can edit the content below before publishing.</p>

    <form [formGroup]="form">
      <div class="form-group">
        <label for="postTitle">Title</label>
        <input id="postTitle" type="text" formControlName="title" placeholder="Post title">
      </div>
      <div class="form-group">
        <label for="postContent">Content</label>
        <textarea id="postContent" formControlName="content" rows="4" placeholder="Write something..."></textarea>
      </div>
    </form>

    <div class="dialog-actions">
      <button class="btn btn-primary" [disabled]="form.invalid" (click)="confirm()">Publish</button>
      <button class="btn btn-secondary" (click)="dismiss()">Skip</button>
    </div>
  </div>
</div>
