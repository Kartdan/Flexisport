<div class="error-overlay" *ngIf="visible" (click)="dismiss()">
  <div class="error-popup" (click)="$event.stopPropagation()">
    <div class="error-icon" aria-hidden="true">!</div>
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <button class="close-btn" type="button" (click)="dismiss()">Close</button>
  </div>
</div>
