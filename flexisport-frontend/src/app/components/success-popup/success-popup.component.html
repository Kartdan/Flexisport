<div class="success-overlay" *ngIf="visible" (click)="dismiss()">
  <div class="success-popup" (click)="$event.stopPropagation()">
    <div class="success-icon" aria-hidden="true">✓</div>
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <button class="close-btn" type="button" (click)="dismiss()">OK</button>
  </div>
</div>
