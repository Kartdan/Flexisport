<div class="login-container">
  <h2>FlexiSport Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" formControlName="email" placeholder="Enter your email">
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" formControlName="password" placeholder="Enter your password">
    </div>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <button type="submit" [disabled]="loginForm.invalid">Sign In</button>
  </form>

  <p class="footer-text">Don't have an account? <a routerLink="/signup">Register here</a></p>
</div>

<app-error-popup
  [visible]="popup.visible"
  [type]="popup.type"
  [title]="popup.title"
  [message]="popup.message"
  (closed)="closePopup()"
></app-error-popup>
