<div class="profile-page">
  <app-success-popup
    [visible]="showSuccessPopup"
    [title]="successPopupTitle"
    [message]="successPopupMessage"
    (closed)="onSuccessPopupClosed()">
  </app-success-popup>

  <div class="profile-header">
    <h2>My Profile</h2>
    <p>Manage your account information.</p>
  </div>

  <div *ngIf="loading" class="loading">Loading profile...</div>
  <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <form class="profile-card" *ngIf="!loading" [formGroup]="profileForm" (ngSubmit)="saveProfile()">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" formControlName="fullName" />
      <small *ngIf="profileForm.get('fullName')?.touched && profileForm.get('fullName')?.invalid">
        Please enter at least 2 characters.
      </small>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" />
      <small *ngIf="profileForm.get('username')?.touched && profileForm.get('username')?.invalid">
        Username must be at least 3 characters.
      </small>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <small *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.invalid">
        Enter a valid email address.
      </small>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <input id="role" type="text" formControlName="role" [attr.disabled]="true" />
    </div>

    <div class="form-group">
      <label>Preferred Sports</label>
      <div class="checkbox-group" *ngIf="sports.length > 0">
        <label class="checkbox-label" *ngFor="let sport of sports">
          <input
            type="checkbox"
            [checked]="isSportSelected(sport.slug)"
            (change)="togglePreferredSport(sport.slug, $event)"
          />
          {{ sport.emoji }} {{ sport.name }}
        </label>
      </div>
    </div>

    <div class="form-group" *ngIf="sports.length > 0">
      <label>Games played by sport</label>
      <div class="games-grid">
        <div class="games-item" *ngFor="let sport of sports">
          <label>{{ sport.emoji }} {{ sport.name }}</label>
          <div class="games-value">{{ getGamesForSport(sport.slug) }}</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="personalDescription">Personal Description</label>
      <textarea
        id="personalDescription"
        formControlName="personalDescription"
        rows="4"
        maxlength="1000"
        placeholder="Tell others a bit about your playing style, goals, or experience..."
      ></textarea>
      <small *ngIf="profileForm.get('personalDescription')?.touched && profileForm.get('personalDescription')?.invalid">
        Description must be at most 1000 characters.
      </small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving || profileForm.invalid">
        {{ saving ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
